[pytest]
# 비동기 테스트를 자동으로 인식하도록 설정 (STRICT 모드 해결)
asyncio_mode = auto

# 비동기 테스트의 기본 루프 범위 설정
asyncio_default_fixture_loop_scope = function

# 백엔드 코드를 찾을 수 있도록 파이썬 경로 추가 (PYTHONPATH 자동화)
pythonpath = backend

# 테스트 파일 탐색 경로 설정
testpaths = backend/tests

# 불필요한 경고 메시지 출력 억제
filterwarnings =
    ignore::DeprecationWarning
    ignore::pydantic.PydanticDeprecatedSince20
